name: Pipeline

on:
  push:
    branches:
      - "**"

jobs:
  docker-workflow:
    name: Docker Workflow

    permissions:
      contents: write
      packages: write
      id-token: write

    uses: simonjensen/pipelines/.github/workflows/docker.yaml@190f6f969c846c05e199229a18827e4c71f17004 # main
    with:
      image-name: ${{ github.repository }}
